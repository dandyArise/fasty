<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .text {
                font-family: Arial, sans-serif;
                font-weight: bold;
                fill: #333333;
            }
            .icon-fill {
                fill: #009688;
            }
            .icon-stroke {
                stroke: #009688;
                stroke-width: 2;
                fill: none;
            }
            .yaml-line {
                stroke: #bdbdbd;
                stroke-width: 2;
                stroke-linecap: round;
            }
        </style>
    </defs>

    <!-- Background (transparent by default, added for preview clarity if needed) -->
    <rect
    width="100%" height="100%" fill="none"/>

    <!-- Icon Group -->
    <g
        transform="translate(20, 20)">
        <!-- File Shape -->
        <rect
        x="0" y="0" width="80" height="80" rx="10" class="icon-stroke"/>
        <!-- YAML Lines -->
        <line x1="15" y1="25" x2="65" y2="25" class="yaml-line"/>
        <line x1="15" y1="40" x2="50" y2="40" class="yaml-line"/>
        <line
        x1="15" y1="55" x2="60" y2="55" class="yaml-line"/>
        <!-- Lightning Bolt (Speed/Dynamic) -->
        <path d="M50 10 L30 45 L45 45 L25 80 L60 35 L40 35 Z" class="icon-fill" opacity="0.9"/>
    </g>

    <!-- Text -->
    <text x="120" y="75" class="text" font-size="48">Fasty</text>
    <text x="122" y="100" font-family="Arial, sans-serif" font-size="14" fill="#666666">Dynamic Rest API with YAML</text>
</svg>
